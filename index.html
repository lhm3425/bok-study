<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="한은 경제학">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>한은 경제학 학습 앱</title>
  <style>
    :root {
      --bg:#f7faf9; --paper:#fff; --ink:#111827; --muted:#64748b; --line:#d8e3df;
      --brand:#0f766e; --soft:#e7f5f2; --warm:#b45309; --warm-soft:#fff7ed;
      --blue:#1d4ed8; --blue-soft:#eff6ff; --good:#047857; --good-soft:#ecfdf5;
      --bad:#b91c1c; --bad-soft:#fef2f2; --shadow:0 10px 28px rgba(15,23,42,.08);
    }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; font-family:Arial,"Malgun Gothic",sans-serif; color:var(--ink); background:var(--bg); letter-spacing:0; }
    header { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.96); border-bottom:1px solid var(--line); backdrop-filter:blur(10px); }
    .top { max-width:980px; margin:0 auto; padding:14px 14px 10px; }
    h1 { margin:0 0 10px; font-size:22px; line-height:1.25; }
    button, input, select { border:1px solid var(--line); border-radius:8px; min-height:42px; padding:10px 12px; font:inherit; background:#fff; color:var(--ink); }
    button { cursor:pointer; }
    button.primary { background:var(--brand); border-color:var(--brand); color:#fff; font-weight:700; }
    .mode-tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
    .mode-tabs button.active { background:var(--brand); border-color:var(--brand); color:#fff; font-weight:700; }
    .bar { display:grid; grid-template-columns:1fr auto; gap:8px; }
    nav { max-width:980px; margin:0 auto; overflow-x:auto; display:flex; gap:8px; padding:0 14px 12px; scrollbar-width:none; }
    nav::-webkit-scrollbar { display:none; }
    nav button { white-space:nowrap; min-height:38px; padding:8px 11px; font-size:14px; }
    nav button.active { background:var(--soft); border-color:#9ed6cf; color:var(--brand); font-weight:700; }
    main { max-width:980px; margin:0 auto; padding:12px; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
    .stat { background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:10px; box-shadow:var(--shadow); }
    .stat strong { display:block; font-size:19px; }
    .stat span { display:block; color:var(--muted); font-size:12px; margin-top:3px; }
    .unit-title { display:flex; justify-content:space-between; align-items:flex-end; gap:10px; margin:18px 0 10px; }
    h2 { margin:0; font-size:20px; line-height:1.35; }
    .unit-title small { color:var(--muted); white-space:nowrap; }
    .keyword-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .card, .question { background:var(--paper); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); overflow:hidden; margin-bottom:12px; }
    .card summary { list-style:none; cursor:pointer; padding:13px; min-height:70px; }
    .card summary::-webkit-details-marker { display:none; }
    .keyword-head { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
    h3 { margin:0; font-size:16px; line-height:1.35; word-break:keep-all; overflow-wrap:anywhere; }
    .tag, .badge { display:inline-block; border-radius:999px; padding:3px 8px; font-size:12px; color:var(--brand); background:var(--soft); border:1px solid #b9ded8; }
    .hint { color:var(--muted); font-size:13px; line-height:1.45; margin-top:7px; }
    .body { border-top:1px solid var(--line); padding:13px; background:#fff; }
    .block { margin-bottom:12px; }
    .block:last-child { margin-bottom:0; }
    .label { display:inline-block; font-size:12px; font-weight:700; color:var(--brand); background:var(--soft); border-radius:999px; padding:3px 8px; margin-bottom:6px; }
    .label.warm { color:var(--warm); background:var(--warm-soft); }
    .label.blue { color:var(--blue); background:var(--blue-soft); }
    ul { margin:0; padding-left:18px; }
    li { margin:6px 0; line-height:1.55; word-break:keep-all; overflow-wrap:anywhere; }
    li.formula-item { list-style:none; margin-left:-18px; }
    .formula {
      display:block;
      max-width:100%;
      overflow-x:auto;
      overflow-y:hidden;
      white-space:nowrap;
      word-break:normal;
      overflow-wrap:normal;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fbfefd;
      padding:9px 10px;
      margin:6px 0;
      font-family:"Cambria Math","STIX Two Math","Noto Sans Math","Segoe UI Symbol","Times New Roman",serif;
      font-size:15px;
      line-height:1.7;
      -webkit-overflow-scrolling:touch;
    }
    .formula .prefix {
      font-family:Arial,"Malgun Gothic",sans-serif;
      color:var(--muted);
      font-size:12px;
      margin-right:6px;
    }
    .formula .math {
      letter-spacing:.01em;
    }
    .formula sup, .formula sub {
      font-size:.72em;
      line-height:0;
    }
    .qhead { padding:13px; border-bottom:1px solid var(--line); }
    .qhead h2 { font-size:17px; line-height:1.55; margin-top:8px; word-break:keep-all; overflow-wrap:anywhere; }
    .choices { display:grid; gap:8px; padding:12px; }
    .choice { text-align:left; border:1px solid var(--line); border-radius:8px; background:#fff; padding:11px; line-height:1.45; word-break:keep-all; overflow-wrap:anywhere; }
    .choice.selected { outline:2px solid var(--brand); background:var(--soft); }
    .choice.correct { border-color:#86efac; background:var(--good-soft); color:#065f46; }
    .choice.wrong { border-color:#fecaca; background:var(--bad-soft); color:#991b1b; }
    .answer { display:none; border-top:1px solid var(--line); padding:12px; line-height:1.6; background:#fbfefd; word-break:keep-all; overflow-wrap:anywhere; }
    .answer.show { display:block; }
    .answer strong { color:var(--brand); }
    .actions { display:flex; gap:8px; padding:0 12px 12px; }
    .actions button { flex:1; }
    .empty { display:none; background:#fff; border:1px solid var(--line); border-radius:8px; padding:18px; text-align:center; color:var(--muted); }
    .fab { position:fixed; right:14px; bottom:calc(14px + env(safe-area-inset-bottom)); z-index:20; width:48px; height:48px; border-radius:50%; border-color:var(--brand); background:var(--brand); color:#fff; box-shadow:var(--shadow); font-size:18px; padding:0; }
    mark { background:#fde68a; padding:0 2px; border-radius:3px; }
    @media (max-width:680px) {
      .top { padding-top:12px; }
      h1 { font-size:20px; }
      main { padding:10px; }
      .keyword-grid { grid-template-columns:1fr; }
      .bar { grid-template-columns:1fr; }
      .stat { padding:9px 8px; }
      .stat strong { font-size:17px; }
      .card summary { min-height:auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <h1>한은 경제학 학습 앱</h1>
      <div class="mode-tabs">
        <button id="conceptMode" class="active">개념 요약</button>
        <button id="quizMode">객관식 연습</button>
      </div>
      <div class="bar" id="conceptBar">
        <input id="search" type="search" placeholder="키워드 검색: 독점, 테일러, 환율, OLS">
        <button class="primary" id="openAll">전체열기</button>
      </div>
      <div class="bar" id="quizBar" style="display:none">
        <select id="quizFilter">
          <option value="all">전체 문항</option>
          <option value="wrong">틀린 문항만</option>
          <option value="unanswered">안 푼 문항만</option>
        </select>
        <button class="primary" id="resetQuiz">기록 초기화</button>
      </div>
    </div>
    <nav id="tabs" aria-label="단원 선택"></nav>
  </header>
  <main>
    <section class="stats">
      <div class="stat"><strong id="statA">0</strong><span id="labelA">단원</span></div>
      <div class="stat"><strong id="statB">0</strong><span id="labelB">키워드</span></div>
      <div class="stat"><strong id="statC">0</strong><span id="labelC">표시중</span></div>
    </section>
    <section id="conceptView"></section>
    <section id="quizView" style="display:none"></section>
    <div class="empty" id="empty">표시할 내용이 없습니다.</div>
  </main>
  <button class="fab" id="topBtn" aria-label="맨 위로">↑</button>
  <script>
    const DATA = [...([
      {

            core: ["예산선 위에서 효용이 가장 큰 점을 고른다.", "내부해는 MRS = Px/Py, 코너해는 한계효용 대비 가격을 비교한다.", "마셜수요는 효용극대화, 힉스수요는 지출최소화에서 나온다."],

          },
          {

            memorize: ["왈라스 법칙: 가격가중 초과수요 합은 0", "후생경제학 제1정리: 경쟁균형은 파레토 효율", "후생경제학 제2정리: 적절한 초기분배로 원하는 효율 배분 달성"],

    const UNITS = ["전체", ...DATA.map(unit => unit.unit)];
    let screen = "concept";
    let selected = "전체";
    let allOpen = false;
    const results = JSON.parse(localStorage.getItem("bokQuizResults") || "{}");
    const $ = id => document.getElementById(id);

    function saveQuiz() { localStorage.setItem("bokQuizResults", JSON.stringify(results)); }
    function textFor(item) { return [item.keyword, item.hint, ...item.core, ...item.memorize, ...item.exam].join(" "); }
    function esc(text) { return String(text).replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch])); }
    function highlight(text, q) {
      const safe = esc(text);
      if (!q) return safe;
      const needle = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return safe.replace(new RegExp(needle, "gi"), match => `<mark>${match}</mark>`);
    }
    function isFormulaLine(text) {
      return /[=Σ∑βκλρσπθωαΔχ²≤≥]|\b(FOC|MRS|MRT|MR|MC|UIP|PPP|NKPC|VAR|ADF|ECM|DW|LM|LR|Wald|TVC|IRF|Cov|Var|E\[|max|min)\b|_[a-zA-Z0-9{]/.test(text);
    }
    function renderFormulaText(text) {
      let raw = esc(text)
        .replaceAll("Σ", "∑")
        .replaceAll("²", "^2")
        .replaceAll("β", "β")
        .replaceAll("π", "π")
        .replaceAll("κ", "κ")
        .replaceAll("λ", "λ")
        .replaceAll("ρ", "ρ")
        .replaceAll("σ", "σ")
        .replaceAll("ω", "ω")
        .replaceAll("α", "α")
        .replaceAll("θ", "θ")
        .replaceAll("Δ", "Δ");
      raw = raw.replace(/\^\{([^}]+)\}/g, "<sup>$1</sup>");
      raw = raw.replace(/_\{([^}]+)\}/g, "<sub>$1</sub>");
      raw = raw.replace(/\^([A-Za-z0-9+\-]+)/g, "<sup>$1</sup>");
      raw = raw.replace(/_([A-Za-z0-9]+)/g, "<sub>$1</sub>");
      return raw;
    }
    function renderConceptItem(text, q) {
      if (!isFormulaLine(text)) return `<li>${highlight(text, q)}</li>`;
      const parts = String(text).split(":");
      const hasPrefix = parts.length > 1 && parts[0].length <= 18;
      const prefix = hasPrefix ? `<span class="prefix">${esc(parts.shift())}:</span>` : "";
      const body = hasPrefix ? parts.join(":").trim() : text;
      return `<li class="formula-item"><span class="formula">${prefix}<span class="math">${renderFormulaText(body)}</span></span></li>`;
    }
    function renderTabs() {
      tabs.innerHTML = UNITS.map(unit => `<button class="${unit === selected ? "active" : ""}" data-unit="${esc(unit)}">${esc(unit)}</button>`).join("");
      tabs.querySelectorAll("button").forEach(btn => btn.onclick = () => { selected = btn.dataset.unit; allOpen = false; render(); window.scrollTo({top:0, behavior:"smooth"}); });
    }
    function renderStats(a, la, b, lb, c, lc) {
      statA.textContent = a; labelA.textContent = la;
      statB.textContent = b; labelB.textContent = lb;
      statC.textContent = c; labelC.textContent = lc;
    }
    function renderConcepts() {
      const q = search.value.trim().toLowerCase();
      const units = DATA.filter(unit => selected === "전체" || selected === unit.unit).map(unit => ({
        ...unit,
        items: unit.items.filter(item => !q || textFor(item).toLowerCase().includes(q))
      })).filter(unit => unit.items.length);
      const totalKeywords = DATA.reduce((sum, unit) => sum + unit.items.length, 0);
      const visible = units.reduce((sum, unit) => sum + unit.items.length, 0);
      renderStats(DATA.length, "단원", totalKeywords, "키워드", visible, "표시중");
      empty.style.display = visible ? "none" : "block";
      conceptView.innerHTML = units.map(unit => `
        <section class="unit">
          <div class="unit-title"><h2>${esc(unit.unit)}</h2><small>${unit.items.length}개 키워드</small></div>
          <div class="keyword-grid">
            ${unit.items.map(item => `
              <details class="card" ${allOpen || q ? "open" : ""}>
                <summary>
                  <div class="keyword-head"><h3>${highlight(item.keyword, q)}</h3><span class="tag">열기</span></div>
                  <div class="hint">${highlight(item.hint, q)}</div>
                </summary>
                <div class="body">
                  <div class="block"><span class="label">핵심개념</span><ul>${item.core.map(x => renderConceptItem(x, q)).join("")}</ul></div>
                  <div class="block"><span class="label warm">암기포인트</span><ul>${item.memorize.map(x => renderConceptItem(x, q)).join("")}</ul></div>
                  <div class="block"><span class="label blue">출제포인트</span><ul>${item.exam.map(x => renderConceptItem(x, q)).join("")}</ul></div>
                </div>
              </details>`).join("")}
          </div>
        </section>`).join("");
      openAll.textContent = allOpen ? "전체닫기" : "전체열기";
    }
    function filteredQuestions() {
      return QUESTIONS.filter(item => {
        const byUnit = selected === "전체" || item.unit === selected;
        const r = results[item.q];
        const mode = quizFilter.value;
        const byMode = mode === "all" || (mode === "wrong" && r && !r.correct) || (mode === "unanswered" && !r);
        return byUnit && byMode;
      });
    }
    function renderQuiz() {
      const list = filteredQuestions();
      const scoped = QUESTIONS.filter(q => selected === "전체" || q.unit === selected);
      const solved = scoped.filter(q => results[q.q]).length;
      const correct = scoped.filter(q => results[q.q]?.correct).length;
      renderStats(scoped.length, "문항", solved, "풀이", solved ? Math.round(correct / solved * 100) + "%" : "0%", "정답률");
      empty.style.display = list.length ? "none" : "block";
      quizView.innerHTML = list.map((item, idx) => {
        const r = results[item.q];
        return `<article class="question" data-q="${esc(item.q)}">
          <div class="qhead"><span class="badge">${esc(item.unit)} · ${esc(item.keyword)}</span><h2>${idx + 1}. ${esc(item.q)}</h2></div>
          <div class="choices">
            ${item.choices.map((choice, i) => {
              const picked = r?.picked === i;
              const cls = r ? (i === item.answer ? "correct" : picked ? "wrong" : "") : picked ? "selected" : "";
              return `<button class="choice ${cls}" data-choice="${i}">${esc(choice)}</button>`;
            }).join("")}
          </div>
          <div class="actions"><button class="primary reveal">정답/해설</button></div>
          <div class="answer ${r ? "show" : ""}"><strong>정답 ${item.answer + 1}번.</strong> ${esc(item.exp)}</div>
        </article>`;
      }).join("");
      quizView.querySelectorAll(".choice").forEach(btn => btn.onclick = () => {
        const article = btn.closest(".question");
        const item = QUESTIONS.find(q => q.q === article.dataset.q);
        const picked = Number(btn.dataset.choice);
        results[item.q] = { picked, correct: picked === item.answer };
        saveQuiz();
        render();
      });
      quizView.querySelectorAll(".reveal").forEach(btn => btn.onclick = () => btn.closest(".question").querySelector(".answer").classList.toggle("show"));
    }
    function render() {
      renderTabs();
      const isConcept = screen === "concept";
      conceptMode.classList.toggle("active", isConcept);
      quizMode.classList.toggle("active", !isConcept);
      conceptBar.style.display = isConcept ? "grid" : "none";
      quizBar.style.display = isConcept ? "none" : "grid";
      conceptView.style.display = isConcept ? "" : "none";
      quizView.style.display = isConcept ? "none" : "";
      if (isConcept) renderConcepts(); else renderQuiz();
    }
    conceptMode.onclick = () => { screen = "concept"; selected = "전체"; render(); };
    quizMode.onclick = () => { screen = "quiz"; selected = "전체"; render(); };
    search.oninput = render;
    openAll.onclick = () => { allOpen = !allOpen; render(); };
    quizFilter.onchange = render;
    resetQuiz.onclick = () => { Object.keys(results).forEach(key => delete results[key]); saveQuiz(); render(); };
    topBtn.onclick = () => window.scrollTo({top:0, behavior:"smooth"});
    if ("serviceWorker" in navigator) window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    render();
  </script>
</body>
</html>
